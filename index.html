      <aside class="rail" aria-label="Primary">
        <div class="rail-brand">
          <span class="brand-mark" aria-hidden="true">P</span>

          </span>

        <button class="rail-link" data-view="calendar" type="button">

          Calendar
        </button>
        <button class="rail-link" data-view="meals" type="button">

          Notes

        <button class="rail-link" data-view="more" type="button">
          <span class="nav-glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 7h14M5 12h14M5 17h14"/></svg>
          </span>
          More
        </button>
      </aside>

      <div class="content-shell">
        <header class="topbar">
          <button class="icon-button mobile-menu" data-view="more" type="button" aria-label="Open more">
            <svg viewBox="0 0 24 24"><path d="M5 7h14M5 12h14M5 17h14"/></svg>

          <button class="icon-button" data-action="export-data" type="button" aria-label="Export family data" title="Export family data">

        </header>

        <main id="app" class="app" tabindex="-1" aria-live="polite"></main>
      </div>

      <nav class="bottom-nav" aria-label="Primary">
        <button class="bottom-link is-active" data-view="today" type="button">
          <span class="nav-glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1z"/></svg>

          </span>
          <span>More</span>
        </button>
      </nav>

    <template id="empty-template">

        <span></span>
      </div>

    <script src="app.js"></script>
